services:
  mongodb:
    image: mongo:8.2-rc #imagen mongo db
    container_name: mongodb_seba #nombre container
    restart: always #para que se reinicie si falla
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin #defino admin de mongodb
      MONGO_INITDB_ROOT_PASSWORD: password #defino password de admin de mongodb
    ports:
      - "27017:27017" #puerto base de datos
    volumes:
      - database_seba:/data/db #volumen persistente de la base de datos
    networks:
      - lemoncode-seba #la red a la cual conecto la db

  backend:
    build:
      context: node-stack/backend #ubicacion
      dockerfile: Dockerfile #docker file a usar
    image: backend_seba:v1 #imagen a buildear del dockerfile + tag
    container_name: backend_seba #nombre del container del backend
    restart: always #para que se reinicie si falla
    depends_on:
      - mongodb #que depende de la creacion del mongodb
    environment:
      NODE_ENV: production #para evitar test, hacer mas liviana la imagen al ser prod.
      DATABASE_URL: mongodb://admin:password@mongodb_seba:27017/LemoncodeCourseDb?authSource=admin #variable con el user admin y el host del backend.
      DATABASE_NAME: LemoncodeCourseDb
      HOST: 0.0.0.0
      PORT: "5000"
    ports:
      - "5000:5000" #puerto del backend
    networks:
      - lemoncode-seba #red a sar por el backend

  frontend:
    build:
      context: node-stack/frontend #ubicacion
      dockerfile: Dockerfile #docker file a usar
    image: frontend_seba:v1 #imagen a buildear del dockerfile + tag
    container_name: frontend_seba #nombre del container del frontend
    restart: always #para que se reinicie si falla
    depends_on:
      - backend #que depende de la creacion del backend.
    environment:
      NODE_ENV: production #para evitar test, hacer mas liviana la imagen al ser prod.
    env_file:
      - node-stack/frontend/.env-sample #archivo de variables
    ports:
      - "3000:3000" #puerto a usar por el frontend
    networks:
      - lemoncode-seba #red a usar por el frontend

volumes:
  database_seba: #creacion del volumen de la db

networks:
  lemoncode-seba:
    name: lemoncode-seba #creacion de la red de docker