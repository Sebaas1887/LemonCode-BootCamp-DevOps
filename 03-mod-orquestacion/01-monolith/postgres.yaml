apiVersion: v1
kind: Namespace
metadata:
  name: seba

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-postgres-config-seba
  namespace: seba
data:
  POSTGRES_DB: todos_db
  POSTGRES_USER: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_PASSWORD: postgres

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: todo-manual-sc-seba
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: todo-postgres-pv-seba
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: todo-manual-sc-seba
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data/todo-postgres-seba

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: todo-postgres-pvc-seba
  namespace: seba
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: todo-manual-sc-seba
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: todo-postgres-svc-seba
  namespace: seba
spec:
  type: ClusterIP
  selector:
    app: todo-postgres-seba
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: todo-postgres-sts-seba
  namespace: seba
spec:
  serviceName: todo-postgres-svc-seba
  replicas: 1
  selector:
    matchLabels:
      app: todo-postgres-seba
  template:
    metadata:
      labels:
        app: todo-postgres-seba
    spec:
      containers:
        - name: postgres
          image: lemoncodersbc/lc-todo-monolith-psql:v5-2024
          ports:
            - containerPort: 5432
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: todo-postgres-config-seba
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: todo-postgres-config-seba
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: todo-postgres-config-seba
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U postgres -d todos_db
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U postgres -d todos_db
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: todo-postgres-pvc-seba