apiVersion: v1
kind: Namespace
metadata:
  name: seba

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-monolith-config-seba
  namespace: seba
data:
  NODE_ENV : production
  PORT : "3000"
  DB_HOST : todo-postgres-svc-seba
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_PORT : "5432"
  DB_NAME : todos_db
  DB_VERSION : "10.4"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-monolith-deployment-seba
  namespace: seba  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-monolith-seba
  template:
    metadata:
      labels:
        app: todo-monolith-seba
    spec:
      containers:
        - name: todo-monolith
          image: lemoncodersbc/lc-todo-monolith:v5-2024
          ports:
            - containerPort: 3000 #le indicamos a k8s que espere trafico por este port

          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: todo-monolith-config-seba
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: todo-monolith-config-seba
                  key: PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: todo-monolith-config-seba
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: todo-monolith-config-seba
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: todo-monolith-config-seba
                  key: DB_PASSWORD
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: todo-monolith-config-seba
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: todo-monolith-config-seba
                  key: DB_NAME 
            - name: DB_VERSION
              valueFrom:
                configMapKeyRef:
                  name: todo-monolith-config-seba
                  key: DB_VERSION


          resources:
            requests:
              memory: "40Mi"
              cpu: "10m"
            limits:
              memory: "50Mi"
              cpu: "15m"

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3              

---
apiVersion: v1
kind: Service
metadata:
  name: todo-monolith-lb-seba
  namespace: seba  
spec:
  type: LoadBalancer
  selector:
    app: todo-monolith-seba
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000