apiVersion: v1
kind: Namespace
metadata:
  name: seba

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-monolith-deployment-seba
  namespace: seba  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-monolith-seba
  template:
    metadata:
      labels:
        app: todo-monolith-seba
    spec:
      containers:
        - name: todo-monolith
          image: lemoncodersbc/lc-todo-monolith:v5-2024
          ports:
            - containerPort: 3000 #le indicamos a k8s que espere trafico por este port

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"

          resources:
            requests:
              memory: "40Mi"
              cpu: "10m"
            limits:
              memory: "50Mi"
              cpu: "15m"

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3              

---
apiVersion: v1
kind: Service
metadata:
  name: todo-monolith-lb-seba
  namespace: seba  
spec:
  type: LoadBalancer
  selector:
    app: todo-monolith-seba
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000